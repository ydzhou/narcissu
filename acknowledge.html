在那个特别的冬日        
          
这个故事，
关于疾病和苦难
关于药物和副作用
关于开胸手术留下的伤痕和身体饱受治疗后的毒害
关于为了死而无可避免地活着的人

关于一个不是七楼也不是家里的安息之地

这是有着很多关于的故事

但最为重要的
这是关于
一个心跳慢慢冻结的少女
和一个呼吸被悄悄偷走的少年
一同走向死亡的
